services:
  api:
    build: .
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    ports:
      - "8100:8000" # solo dev local; en Coolify se expone por dominio, sin puertos
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    # sin ports: solo accesible desde la red interna de Docker

volumes:
  ollama_data:
